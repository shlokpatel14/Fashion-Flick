<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="./stylesheet/order.css">
</head>
<body>
    <div class="checkout-container">
        <h1>Checkout</h1>
        <form id="checkout-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>
            <div class="form-group">
                <label for="address1">Address Line 1</label>
                <input type="text" id="address1" name="address1" required>
            </div>
            <div class="form-group">
                <label for="address2">Address Line 2</label>
                <input type="text" id="address2" name="address2">
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
                <label for="zip">ZIP/Postal Code</label>
                <input type="text" id="zip" name="zip" required>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="paymentMethod">Payment Method</label>
                <select id="paymentMethod" name="paymentMethod" required>
                    <option value="credit-card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <!-- You can add more payment methods here -->
                </select>
            </div>
            <!-- Credit Card Details -->
            <div id="credit-card-details" class="payment-details">
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" id="cardNumber" name="cardNumber" required>
                </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date</label>
                    <input type="text" id="expiryDate" name="expiryDate" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" required>
                </div>
            </div>
            <!-- PayPal Details (hidden by default) -->
            <div id="paypal-details" class="payment-details" style="display: none;">
                <p>You will be redirected to PayPal to complete your payment.</p>
            </div>
            <button type="submit" id="place-order-btn">Place Order</button>
        </form>
    </div>

    <script>document.addEventListener('DOMContentLoaded', () => {
        const paymentMethodSelect = document.getElementById('paymentMethod');
        const creditCardDetails = document.getElementById('credit-card-details');
        const paypalDetails = document.getElementById('paypal-details');
    
        paymentMethodSelect.addEventListener('change', () => {
            const selectedPaymentMethod = paymentMethodSelect.value;
    
            if (selectedPaymentMethod === 'credit-card') {
                creditCardDetails.style.display = 'block';
                paypalDetails.style.display = 'none';
            } else if (selectedPaymentMethod === 'paypal') {
                creditCardDetails.style.display = 'none';
                paypalDetails.style.display = 'block';
            }
        });
    
        // Handle form submission
        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
    
            const orderData = {
                fullName: document.getElementById('fullName').value,
                address1: document.getElementById('address1').value,
                address2: document.getElementById('address2').value,
                city: document.getElementById('city').value,
                zip: document.getElementById('zip').value,
                country: document.getElementById('country').value,
                phone: document.getElementById('phone').value,
                paymentMethod: document.getElementById('paymentMethod').value,
                orderItems: JSON.parse(localStorage.getItem('cart')) || [], // assuming cart items are stored in localStorage
            };
    
            if (orderData.paymentMethod === 'credit-card') {
                orderData.cardNumber = document.getElementById('cardNumber').value;
                orderData.expiryDate = document.getElementById('expiryDate').value;
                orderData.cvv = document.getElementById('cvv').value;
            }
    
            console.log(orderData);
    
            // Send orderData to the backend via a POST request
            fetch('/api/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Order placed successfully!');
                    localStorage.removeItem('cart'); // Clear cart after successful order
                    window.location.href = '/order-confirmation'; // Redirect to an order confirmation page
                } else {
                    alert('Failed to place order. Please try again.');
                }
            })
            .catch(error => console.error('Error:', error));
        });
    });
    </script>
</body>
</html>

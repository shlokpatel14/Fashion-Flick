<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eshop</title>
    <link rel="stylesheet" href="./stylesheet/styles.css">
    <style>
       /* css/style.css */

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

.main{
    overflow:hidden;
    max-width:100vw;
    width:100%;
    min-height:100vh;
    position:relative;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 20px;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 10;
}

.logo {
    padding-top:10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: absolute;
    left: 20px;
    top: 20px;
}

.logo img {
    width: 50px;
    height: 50px;
    margin : 0px;
    padding-right:30px;
}

.main-logo{
    display : flex;
    color : grey;
}
.logo span {
    font-size: 24px;
    font-weight: bold;
    padding-left:25px;

}

nav {
    margin-top: 15px;
    padding-left:10px;
}

nav ul {
    list-style-type: none;
    padding: 0;
    margin: 5px;
    display: flex;
    align-items: center;
    gap: 20px;
}

nav ul li a {
    text-decoration: none;
    color: white;
    font-size: 18px;
}

.search-login-cart {
    display: flex;
    align-items: center;
    gap: 20px;
    position: absolute;
    top: 20px;
    right: 20px;
    padding-right: 35px;
    padding-top:10px;
}

.search-login-cart input {
    border: none;
    border-radius: 5px;
}

.search-login-cart a {
    text-decoration: none;
    color: white;
    font-size: 18px;
}

.search-login-cart img {
    width: 30px;
    height: 30px;
}

main {
    position: relative;
    height: ;
    width: 100%;
    overflow: hidden;
}
#product-list {
    display: column;
    flex-wrap: wrap;
}

.product {
    width: 100%;
    height:100vh;
}

.product-image {
    width: 100%;
    height: auto;
}


    </style>
</head>
<body>
    <header>
        <div class="logo">
            
            <div class="main-logo">
               
                <a href="index"><img src="./uploads/images/icons/logo.jpg" alt="Fashion Flick Logo"></a>
                    <span>Fashion<br>Flick</span>    
            </div>
            <nav>
                <ul>
                    <li><a href="new-arrival">New Arrival</a></li>
                    <li><a href="#">Men</a></li>
                    <li><a href="#">Women</a></li>
                    <li><a href="#">Kids</a></li>
                </ul>
            </nav>
        </div>
        <div class="search-login-cart">
            <form id="search-form" action="search_results.html" method="get">
                <input type="text" id="search-input" name="query" placeholder="Search">
                <button type="submit" style="display: none;"></button> <!-- Hide the default submit button -->
            </form>
            <a href="login">Log in</a>
            <a href="#">Help</a>
            <a href="checkout"><img src="./uploads/images/icons/shopping-bag.png" alt="Cart"></a>
        </div>
    </header>
    <div id="product-list">
    </div>
    <script>document.addEventListener("DOMContentLoaded", () => {
        const productList = document.getElementById('product-list');
        
        // Fetch recent products from the API
        fetch('http://localhost:3000/api/v1/products/get/isRecent') // Adjust the count as needed
        .then(response => response.json())
                .then(products => {
                    // Check if products were returned successfully
                    if (products && products.length > 0) {
                        products.forEach(product => {
                            // Create a container div for each product
                            const productDiv = document.createElement('div');
                            productDiv.className = 'product';
        
                            // Create an anchor element for redirection
                            const productLink = document.createElement('a');
                            productLink.href = `product-details.html?id=${product._id}`; // Correct the link to include product ID

        
                            // Create an image element
                            const productImg = document.createElement('img');
                            productImg.src = `./uploads/${product.image}`;
                            productImg.alt = product.name;
                            productImg.className = 'product-image';
        
                            // Create a product name element
                            // const productName = document.createElement('h3');
                            // productName.textContent = product.name;
        
                            // Append image to the anchor (link)
                            productLink.appendChild(productImg);
        
                            // Append anchor (link) and name to the product div
                            productDiv.appendChild(productLink);
                            // productDiv.appendChild(productName);
        
                            // Append product div to the product list
                            productList.appendChild(productDiv);
                        });
                    } else {
                        productList.textContent = 'No recent products found.';
                    }
                })
                .catch(error => {
                    console.error('Error fetching products:', error);
                    productList.textContent = 'Failed to load products.';
                });
        });
    </script>
</body>
</html>

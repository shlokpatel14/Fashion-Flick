<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="./stylesheet/cartStyles.css">
</head>
<body>
    <div class="cart-container">
        <h1>Your Shopping Cart</h1>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Cart items will be dynamically generated here -->
            </tbody>
        </table>
        <div class="cart-summary">
            <h2>Cart Summary</h2>
            <p>Subtotal: <span id="subtotal"></span></p>
            <p>Tax: <span id="tax"></span></p>
            <p>Total: <span id="total"></span></p>
            <a href="order"><button id="checkout-btn">Proceed to Checkout</button></a>
        </div>
    </div>

    <script >// Assuming you have an array of cart items stored in the session or localStorage
        const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        
        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
        
            let subtotal = 0;
        
            cartItems.forEach((item, index) => {
                const productTotal = item.quantity * item.price;
                subtotal += productTotal;
        
                cartItemsContainer.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>
                            <input type="number" value="${item.quantity}" min="1" data-index="${index}" class="quantity-input">
                        </td>
                        <td>${item.price.toFixed(2)}</td>
                        <td>${productTotal.toFixed(2)}</td>
                        <td><button class="remove-btn" data-index="${index}">Remove</button></td>
                    </tr>
                `;
            });
        
            const tax = subtotal * 0.1; // Assume a 10% tax rate
            const total = subtotal + tax;
        
            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('tax').textContent = tax.toFixed(2);
            document.getElementById('total').textContent = total.toFixed(2);
        
            addEventListeners();
        }
        
        function addEventListeners() {
            // Update quantity
            document.querySelectorAll('.quantity-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const index = e.target.dataset.index;
                    const newQuantity = e.target.value;
                    cartItems[index].quantity = newQuantity;
                    localStorage.setItem('cart', JSON.stringify(cartItems));
                    renderCart();
                });
            });
        
            // Remove item
            document.querySelectorAll('.remove-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const index = e.target.dataset.index;
                    cartItems.splice(index, 1);
                    localStorage.setItem('cart', JSON.stringify(cartItems));
                    renderCart();
                });
            });
        
            // Checkout button
            document.getElementById('checkout-btn').addEventListener('click', () => {
                // Handle checkout process (e.g., redirect to checkout page)
                alert('Proceed to Checkout');
            });
        }
        
        // Initial render
        renderCart();
        </script>
        
</body>
</html>
